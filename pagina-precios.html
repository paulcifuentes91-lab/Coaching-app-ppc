<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes y Precios - Pro Performance Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #14171B;
            --surface: #1D2126;
            --surface-2: #262B31;
            --border: #2E333A;
            --text: #F3F2EE;
            --text-muted: #9BA1AA;
            --text-faint: #666B73;
            --pink: #FF7FAE;
            --pink-soft: #FFB6D0;
            --radius: 16px;
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 60px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.02em;
        }

        .tagline {
            font-size: 1.3rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .subtitle { color: var(--text-faint); font-size: 1rem; }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .plan-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .plan-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--pink), var(--pink-soft));
        }

        .plan-card:hover {
            border-color: var(--pink);
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(255, 127, 174, 0.2);
        }

        .plan-name {
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--text);
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .plan-price {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            color: var(--pink);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .plan-price-detail { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }

        .plan-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .plan-features { list-style: none; margin-bottom: 24px; }

        .plan-features li {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
            padding-left: 24px;
            position: relative;
        }

        .plan-features li::before {
            content: '✅';
            position: absolute;
            left: 0;
            color: var(--pink);
        }

        .plan-cta {
            width: 100%;
            padding: 12px;
            background: var(--pink);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-family: var(--font-mono);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .plan-cta:hover {
            background: var(--pink-soft);
            transform: scale(1.05);
        }

        .stats-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            margin-bottom: 60px;
            text-align: center;
        }

        .stats-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat {
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
        }

        .stat-number {
            font-family: var(--font-mono);
            font-size: 2rem;
            color: var(--pink);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid var(--border);
            color: var(--text-faint);
            font-size: 0.85rem;
        }

        .loading { text-align: center; padding: 40px; }
        .spinner { border: 3px solid var(--surface-2); border-top: 3px solid var(--pink); border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Planes y Precios</h1>
            <p class="tagline">Entrenamiento Personalizado Online y Presencial</p>
            <p class="subtitle">Pro Performance Coach | Mentalidad Primero</p>
        </header>

        <div class="stats-section">
            <div class="stats-title">📊 Nuestros Números</div>
            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-number" id="statAthletes">-</div>
                    <div class="stat-label">Atletas Activos</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="statIncome">-</div>
                    <div class="stat-label">Ingresos/Mes</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="statPlans">-</div>
                    <div class="stat-label">Tipos de Plan</div>
                </div>
                <div class="stat">
                    <div class="stat-number">95%</div>
                    <div class="stat-label">Asistencia</div>
                </div>
            </div>
        </div>

        <div class="plans-grid" id="plansContainer">
            <div class="loading">
                <div class="spinner"></div>
                Cargando planes...
            </div>
        </div>

        <footer>
            © 2026 Pro Performance Coach | Todos los derechos reservados
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPY3MwFy-vKvL7sQzlPn9K5zL6qvW8",
            authDomain: "pro-performance-e811e.firebaseapp.com",
            projectId: "pro-performance-e811e",
            storageBucket: "pro-performance-e811e.appspot.com",
            messagingSenderId: "859088259827",
            appId: "1:859088259827:web:8a9e4c2b7f1d3e5a6b9c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const planDescriptions = {
            'BÁSICO': 'Entrenamiento online con seguimiento básico',
            'FULL': 'Entrenamiento completo + nutrición online',
            'FULL+4': 'Full + 4 sesiones presenciales por mes',
            'FULL+12': 'Full + 12 sesiones presenciales por mes',
            'TERCERA EDAD': 'Plan especializado para longevidad'
        };

        async function loadPlans() {
            try {
                const snapshot = await db.collection('athletes').get();
                const athletes = [];
                const plansMap = {};

                snapshot.forEach(doc => {
                    const data = doc.data();
                    athletes.push(data);
                    if (!plansMap[data.plan]) {
                        plansMap[data.plan] = {
                            plan: data.plan,
                            price: data.price,
                            count: 1
                        };
                    } else {
                        plansMap[data.plan].count++;
                    }
                });

                const plans = Object.values(plansMap);
                renderPlans(plans);
                updateStats(athletes, plans);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderPlans(plans) {
            let html = '';
            plans.sort((a, b) => a.price - b.price).forEach(plan => {
                const billingCycle = plan.plan === 'TERCERA EDAD' ? 'cada 10 semanas' : 'mensuales';
                html += `
                    <div class="plan-card">
                        <div class="plan-name">${plan.plan}</div>
                        <div class="plan-price">$${(plan.price || 0).toLocaleString()}</div>
                        <div class="plan-price-detail">${billingCycle}</div>
                        <div class="plan-description">${planDescriptions[plan.plan]}</div>
                        <ul class="plan-features">
                            <li>Acceso a aplicación personalizada</li>
                            <li>Tracking de entrenamiento</li>
                            <li>Seguimiento de nutrición</li>
                            <li>Reportes de progreso</li>
                            <li>${plan.count} atleta(s) activo(s)</li>
                        </ul>
                        <button class="plan-cta" onclick="alert('Contacta al coach para más información')">Contratar Ahora</button>
                    </div>
                `;
            });
            document.getElementById('plansContainer').innerHTML = html;
        }

        function updateStats(athletes, plans) {
            const totalIncome = athletes.reduce((sum, a) => sum + (a.price || 0), 0);
            document.getElementById('statAthletes').textContent = athletes.length;
            document.getElementById('statIncome').textContent = `$${totalIncome.toLocaleString()}`;
            document.getElementById('statPlans').textContent = plans.length;
        }

        loadPlans();
    </script>
</body>
</html>
