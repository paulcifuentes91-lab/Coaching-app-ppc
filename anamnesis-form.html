<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anamnesis - Pro Performance Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #14171B;
            --surface: #1D2126;
            --surface-2: #262B31;
            --border: #2E333A;
            --text: #F3F2EE;
            --text-muted: #9BA1AA;
            --text-faint: #666B73;
            --pink: #FF7FAE;
            --radius: 16px;
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }

        header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 30px;
            border-top: 3px solid var(--pink);
            text-align: center;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .subtitle { color: var(--text-muted); }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-faint);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            font-family: var(--font-body);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--pink);
        }

        textarea { min-height: 100px; }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
        }

        .checkbox-item input { width: auto; margin: 0; }

        .btn {
            padding: 12px 20px;
            background: var(--pink);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-mono);
            text-transform: uppercase;
            width: 100%;
        }

        .btn:hover { background: #FFB6D0; }

        .athlete-select { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Anamnesis - Evaluación Inicial</h1>
            <p class="subtitle">Formulario completo de evaluación del atleta</p>
        </header>

        <!-- SELECCIONAR ATLETA -->
        <div class="section athlete-select">
            <div class="section-title">👥 Seleccionar Atleta</div>
            <div class="form-group">
                <label>Atleta</label>
                <select id="athleteSelect" onchange="loadAthlete()">
                    <option value="">-- Seleccionar --</option>
                </select>
            </div>
        </div>

        <form id="anamnesisForm" style="display: none;">
            <!-- DATOS PERSONALES -->
            <div class="section">
                <div class="section-title">👤 Datos Personales</div>
                <div class="grid">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="nombre" disabled>
                    </div>
                    <div class="form-group">
                        <label>Edad</label>
                        <input type="number" id="edad" placeholder="30">
                    </div>
                    <div class="form-group">
                        <label>Género</label>
                        <select id="genero">
                            <option value="">Seleccionar</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Peso (kg)</label>
                        <input type="number" id="peso" placeholder="80" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Altura (cm)</label>
                        <input type="number" id="altura" placeholder="180">
                    </div>
                </div>
            </div>

            <!-- OBJETIVOS -->
            <div class="section">
                <div class="section-title">🎯 Objetivos</div>
                <div class="form-group">
                    <label>Objetivo Principal</label>
                    <textarea id="objetivoPrincipal" placeholder="Describe el objetivo principal..."></textarea>
                </div>
                <div class="form-group">
                    <label>Objetivos Secundarios</label>
                    <textarea id="objetivosSecundarios" placeholder="Otros objetivos..."></textarea>
                </div>
            </div>

            <!-- HISTORIAL MÉDICO -->
            <div class="section">
                <div class="section-title">⚕️ Historial Médico</div>
                <div class="form-group">
                    <label>Lesiones Previas o Actuales</label>
                    <textarea id="lesiones" placeholder="Describe cualquier lesión..."></textarea>
                </div>
                <div class="form-group">
                    <label>Cirugías</label>
                    <textarea id="cirugias" placeholder="Historial quirúrgico..."></textarea>
                </div>
                <div class="form-group">
                    <label>Medicamentos Actuales</label>
                    <textarea id="medicamentos" placeholder="Medicinas que toma..."></textarea>
                </div>
                <div class="form-group">
                    <label>Alergias</label>
                    <textarea id="alergias" placeholder="Alergias conocidas..."></textarea>
                </div>
            </div>

            <!-- EXPERIENCIA EN ENTRENAMIENTO -->
            <div class="section">
                <div class="section-title">💪 Experiencia en Entrenamiento</div>
                <div class="form-group">
                    <label>Años de Experiencia</label>
                    <select id="experiencia">
                        <option value="principiante">Principiante (0-1 año)</option>
                        <option value="intermedio">Intermedio (1-3 años)</option>
                        <option value="avanzado">Avanzado (3-5 años)</option>
                        <option value="elite">Elite (+5 años)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipo de Entrenamiento Anterior</label>
                    <textarea id="entrenamientoAnterior" placeholder="Tipos de entrenamiento realizados..."></textarea>
                </div>
            </div>

            <!-- HÁBITOS Y ESTILO DE VIDA -->
            <div class="section">
                <div class="section-title">🌙 Hábitos y Estilo de Vida</div>
                <div class="form-group">
                    <label>Horas de Sueño Promedio</label>
                    <input type="number" id="sueno" placeholder="8" min="4" max="12">
                </div>
                <div class="form-group">
                    <label>Nivel de Estrés</label>
                    <select id="estres">
                        <option value="">Seleccionar</option>
                        <option value="bajo">Bajo</option>
                        <option value="medio">Medio</option>
                        <option value="alto">Alto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Consumo de Alcohol</label>
                    <select id="alcohol">
                        <option value="">Seleccionar</option>
                        <option value="no">No</option>
                        <option value="ocasional">Ocasional</option>
                        <option value="regular">Regular</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fumador</label>
                    <select id="fumar">
                        <option value="">Seleccionar</option>
                        <option value="no">No</option>
                        <option value="ocasional">Ocasional</option>
                        <option value="diario">Diario</option>
                    </select>
                </div>
            </div>

            <!-- NUTRICIÓN -->
            <div class="section">
                <div class="section-title">🥗 Nutrición</div>
                <div class="form-group">
                    <label>Restricciones Dietéticas</label>
                    <textarea id="restricciones" placeholder="Vegetariano, alérgico a..."></textarea>
                </div>
                <div class="form-group">
                    <label>Preferencias Alimentarias</label>
                    <textarea id="preferencias" placeholder="Comidas que le gustan/no gustan..."></textarea>
                </div>
                <div class="form-group">
                    <label>Suplementos Actuales</label>
                    <textarea id="suplementos" placeholder="Suplementos que toma..."></textarea>
                </div>
            </div>

            <!-- DISPONIBILIDAD -->
            <div class="section">
                <div class="section-title">📅 Disponibilidad</div>
                <div class="form-group">
                    <label>Horarios Disponibles</label>
                    <textarea id="horarios" placeholder="Ej: Lunes a Viernes 6pm-8pm..."></textarea>
                </div>
                <div class="form-group">
                    <label>Equipamiento Disponible</label>
                    <textarea id="equipamiento" placeholder="Mancuernas, barras, máquinas..."></textarea>
                </div>
            </div>

            <!-- OBSERVACIONES -->
            <div class="section">
                <div class="section-title">📝 Observaciones Generales</div>
                <div class="form-group">
                    <label>Notas Adicionales</label>
                    <textarea id="observaciones" placeholder="Cualquier información adicional..."></textarea>
                </div>
            </div>

            <button type="button" class="btn" onclick="saveAnamnesis()">💾 Guardar Anamnesis</button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPY3MwFy-vKvL7sQzlPn9K5zL6qvW8",
            authDomain: "pro-performance-e811e.firebaseapp.com",
            projectId: "pro-performance-e811e",
            storageBucket: "pro-performance-e811e.appspot.com",
            messagingSenderId: "859088259827",
            appId: "1:859088259827:web:8a9e4c2b7f1d3e5a6b9c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let athletes = [];
        let currentAthleteId = null;

        async function loadAthletes() {
            try {
                const snapshot = await db.collection('athletes').get();
                athletes = [];

                snapshot.forEach(doc => {
                    athletes.push({ id: doc.id, ...doc.data() });
                });

                const select = document.getElementById('athleteSelect');
                athletes.forEach(athlete => {
                    const option = document.createElement('option');
                    option.value = athlete.id;
                    option.textContent = athlete.nombre;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAthlete() {
            const id = document.getElementById('athleteSelect').value;
            if (!id) return;

            currentAthleteId = id;
            const athlete = athletes.find(a => a.id === id);

            document.getElementById('nombre').value = athlete.nombre;

            // Cargar anamnesis existente si existe
            try {
                const anamnesisDoc = await db.collection('athletes').doc(id).collection('evaluacion').doc('anamnesis').get();
                if (anamnesisDoc.exists) {
                    const data = anamnesisDoc.data();
                    Object.keys(data).forEach(key => {
                        const input = document.getElementById(key);
                        if (input) input.value = data[key] || '';
                    });
                }
            } catch (error) {
                console.log('Primera anamnesis para este atleta');
            }

            document.getElementById('anamnesisForm').style.display = 'block';
        }

        async function saveAnamnesis() {
            if (!currentAthleteId) return;

            const anamnesisData = {
                edad: document.getElementById('edad').value,
                genero: document.getElementById('genero').value,
                peso: document.getElementById('peso').value,
                altura: document.getElementById('altura').value,
                objetivoPrincipal: document.getElementById('objetivoPrincipal').value,
                objetivosSecundarios: document.getElementById('objetivosSecundarios').value,
                lesiones: document.getElementById('lesiones').value,
                cirugias: document.getElementById('cirugias').value,
                medicamentos: document.getElementById('medicamentos').value,
                alergias: document.getElementById('alergias').value,
                experiencia: document.getElementById('experiencia').value,
                entrenamientoAnterior: document.getElementById('entrenamientoAnterior').value,
                sueno: document.getElementById('sueno').value,
                estres: document.getElementById('estres').value,
                alcohol: document.getElementById('alcohol').value,
                fumar: document.getElementById('fumar').value,
                restricciones: document.getElementById('restricciones').value,
                preferencias: document.getElementById('preferencias').value,
                suplementos: document.getElementById('suplementos').value,
                horarios: document.getElementById('horarios').value,
                equipamiento: document.getElementById('equipamiento').value,
                observaciones: document.getElementById('observaciones').value,
                completedAt: new Date()
            };

            try {
                await db.collection('athletes').doc(currentAthleteId).collection('evaluacion').doc('anamnesis').set(anamnesisData, { merge: true });
                alert('✅ Anamnesis guardada exitosamente');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        loadAthletes();
    </script>
</body>
</html>
