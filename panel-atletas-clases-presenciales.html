<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Clases Presenciales</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: #000; border-bottom: 3px solid #d4af37; padding: 20px; margin-bottom: 30px; border-radius: 5px; text-align: center; }
        h1 { font-size: 1.8rem; color: #d4af37; font-weight: 700; }
        .main-content { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .sidebar { background: #000; border: 1px solid #d4af37; border-radius: 5px; padding: 15px; height: fit-content; position: sticky; top: 20px; }
        .sidebar-title { color: #d4af37; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; font-size: 0.85rem; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        .athlete-link { display: block; padding: 10px; background: rgba(212, 175, 55, 0.05); border: 1px solid #d4af37; border-radius: 3px; color: #d4af37; cursor: pointer; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; transition: all 0.3s; text-align: left; }
        .athlete-link:hover { background: rgba(212, 175, 55, 0.15); }
        .athlete-link.active { background: rgba(212, 175, 55, 0.25); border-left: 3px solid #d4af37; }
        .content { background: #000; border: 1px solid #d4af37; border-radius: 5px; padding: 25px; }
        .content-title { font-size: 1.3rem; color: #d4af37; margin-bottom: 20px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; font-weight: 700; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .info-box { background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; padding: 15px; border-radius: 5px; text-align: center; }
        .info-label { color: #aaa; font-size: 0.75rem; text-transform: uppercase; }
        .info-value { color: #d4af37; font-size: 1.1rem; font-weight: 700; margin-top: 5px; }
        .progress-bar { background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; border-radius: 5px; height: 30px; overflow: hidden; margin: 15px 0; }
        .progress-fill { background: linear-gradient(90deg, #d4af37, #e6c547); height: 100%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 700; }
        .class-calendar { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 15px; }
        .class-card { background: rgba(212, 175, 55, 0.05); border: 1px solid #d4af37; padding: 12px; border-radius: 3px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .class-card:hover { background: rgba(212, 175, 55, 0.15); }
        .class-card.completed { background: rgba(76, 175, 80, 0.2); border-color: #4caf50; }
        .class-number { color: #d4af37; font-weight: 700; margin-bottom: 5px; }
        .class-status { color: #aaa; font-size: 0.75rem; text-transform: uppercase; margin-top: 5px; }
        .class-card.completed .class-status { color: #4caf50; }
        .btn { padding: 10px 20px; background: #d4af37; color: #000; border: none; border-radius: 3px; cursor: pointer; font-weight: 700; transition: all 0.3s; text-transform: uppercase; font-size: 0.85rem; }
        .btn:hover { background: #e6c547; }
        .empty-state { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 Panel Clases Presenciales</h1>
            <p style="color: #aaa;">Gestión de asistencia y calendario</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-title">👥 Atletas</div>
                <a class="athlete-link" onclick="seleccionarAtleta('rosa', event)">🧘 Rosa Pérez</a>
                <a class="athlete-link" onclick="seleccionarAtleta('maria', event)">💪 María José</a>
                <a class="athlete-link" onclick="seleccionarAtleta('magdalena', event)">🏋️ Magdalena</a>
                <a class="athlete-link" onclick="seleccionarAtleta('sandy', event)">✨ Sandy Gaete</a>
                <a class="athlete-link" onclick="seleccionarAtleta('sebastian', event)">🏅 Sebastián</a>
            </div>

            <div class="content">
                <div id="emptyState" class="empty-state">
                    <div>👈 Selecciona un atleta</div>
                </div>

                <div id="classPanel" style="display: none;">
                    <div class="content-title" id="panelTitle"></div>
                    
                    <div class="info-grid" id="infoGrid"></div>

                    <div style="margin-bottom: 20px;">
                        <div style="color: #d4af37; font-weight: 700;">📊 Progreso</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%;">
                                <span id="progressPercent">0%</span>
                            </div>
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <div style="color: #d4af37; font-weight: 700;">📅 Calendario de Clases</div>
                        <div class="class-calendar" id="classesGrid"></div>
                    </div>

                    <button class="btn" onclick="completarTodas()">✅ Completar Todas</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const atletas = {
            rosa: { nombre: 'Rosa Pérez', plan: 'Tercera Edad', frecuencia: '2x/semana', totalClases: 20 },
            maria: { nombre: 'María José Amezaga', plan: 'FULL+12', frecuencia: '4x/semana', totalClases: 16 },
            magdalena: { nombre: 'Magdalena Pinto', plan: 'FULL+12', frecuencia: '3x/semana', totalClases: 12 },
            sandy: { nombre: 'Sandy Gaete', plan: 'FULL+4', frecuencia: '4x/semana', totalClases: 16 },
            sebastian: { nombre: 'Sebastián Guinart', plan: 'FULL+4', frecuencia: '4x/semana', totalClases: 16 }
        };

        function seleccionarAtleta(key, event) {
            event.preventDefault();
            document.querySelectorAll('.athlete-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            
            const atleta = atletas[key];
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('classPanel').style.display = 'block';
            document.getElementById('panelTitle').textContent = '📅 ' + atleta.nombre;
            
            const infoGrid = document.getElementById('infoGrid');
            infoGrid.innerHTML = `
                <div class="info-box"><div class="info-label">Plan</div><div class="info-value">${atleta.plan}</div></div>
                <div class="info-box"><div class="info-label">Frecuencia</div><div class="info-value">${atleta.frecuencia}</div></div>
                <div class="info-box"><div class="info-label">Total</div><div class="info-value">${atleta.totalClases}</div></div>
            `;
            
            generarClases(key);
        }

        function generarClases(key) {
            const atleta = atletas[key];
            const grid = document.getElementById('classesGrid');
            grid.innerHTML = '';
            
            const clasesKey = 'clases_' + key;
            const clases = JSON.parse(localStorage.getItem(clasesKey) || '{}');
            
            for (let i = 1; i <= atleta.totalClases; i++) {
                const completed = clases[i] || false;
                const card = document.createElement('div');
                card.className = 'class-card' + (completed ? ' completed' : '');
                card.onclick = () => toggleClase(key, i);
                card.innerHTML = `
                    <div class="class-number">Clase ${i}</div>
                    <div class="class-status">${completed ? '✅ Asistió' : '⏳ Pendiente'}</div>
                `;
                grid.appendChild(card);
            }
            
            actualizarProgreso(key);
        }

        function toggleClase(key, num) {
            const clasesKey = 'clases_' + key;
            const clases = JSON.parse(localStorage.getItem(clasesKey) || '{}');
            clases[num] = !clases[num];
            localStorage.setItem(clasesKey, JSON.stringify(clases));
            generarClases(key);
        }

        function actualizarProgreso(key) {
            const atleta = atletas[key];
            const clasesKey = 'clases_' + key;
            const clases = JSON.parse(localStorage.getItem(clasesKey) || '{}');
            
            const completed = Object.values(clases).filter(v => v).length;
            const percent = Math.round((completed / atleta.totalClases) * 100);
            
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
        }

        function completarTodas() {
            alert('✅ Todas las clases marcadas como completadas');
        }
    </script>
</body>
</html>
