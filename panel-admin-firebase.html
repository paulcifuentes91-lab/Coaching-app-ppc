<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Pro Performance Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #14171B;
            --surface: #1D2126;
            --surface-2: #262B31;
            --border: #2E333A;
            --text: #F3F2EE;
            --text-muted: #9BA1AA;
            --text-faint: #666B73;
            --pink: #FF7FAE;
            --accent: #FF7FAE;
            --radius: 16px;
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 30px;
            border-top: 3px solid var(--pink);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--pink);
            margin-bottom: 8px;
        }

        .subtitle { color: var(--text-muted); margin-bottom: 15px; }

        .status { 
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status.error {
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--pink);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .kpi-value {
            font-size: 2rem;
            color: var(--pink);
            font-weight: 700;
            font-family: var(--font-mono);
            margin-bottom: 4px;
        }

        .kpi-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--surface-2);
            color: var(--text-muted);
            padding: 12px;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:hover { background: var(--surface-2); }

        .athlete-name { color: var(--pink); font-weight: 600; }
        .athlete-plan { color: var(--text-muted); }
        .athlete-price { color: var(--text); font-family: var(--font-mono); font-weight: 600; }

        button {
            padding: 8px 16px;
            background: var(--pink);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--pink-soft);
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
        }

        .spinner {
            border: 3px solid var(--surface-2);
            border-top: 3px solid var(--pink);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Panel Admin Pro Performance Coach</h1>
            <p class="subtitle">Gestiona precios, vencimientos y montos a cobrar</p>
            <div id="firebaseStatus" class="status">Conectando a Firebase...</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-title">📊 Total Atletas</div>
                <div class="kpi-value" id="totalAthletes">-</div>
                <div class="kpi-label">Usuarios activos</div>
            </div>

            <div class="card">
                <div class="card-title">💰 Ingresos/Mes</div>
                <div class="kpi-value" id="totalIncome">-</div>
                <div class="kpi-label">Todos los planes</div>
            </div>

            <div class="card">
                <div class="card-title">🔴 A Cobrar</div>
                <div class="kpi-value" id="totalDue">-</div>
                <div class="kpi-label">Pendiente</div>
            </div>

            <div class="card">
                <div class="card-title">✅ Pagado</div>
                <div class="kpi-value" id="totalPaid">-</div>
                <div class="kpi-label">Este mes</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">👥 Gestión de Atletas</div>
            <div id="athletesList">
                <div class="loading">
                    <div class="spinner"></div>
                    Cargando atletas de Firebase...
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPY3MwFy-vKvL7sQzlPn9K5zL6qvW8",
            authDomain: "pro-performance-e811e.firebaseapp.com",
            projectId: "pro-performance-e811e",
            storageBucket: "pro-performance-e811e.appspot.com",
            messagingSenderId: "859088259827",
            appId: "1:859088259827:web:8a9e4c2b7f1d3e5a6b9c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadAthletes() {
            try {
                document.getElementById('firebaseStatus').innerHTML = '✅ Conectado a Firebase';
                document.getElementById('firebaseStatus').className = 'status';

                const snapshot = await db.collection('athletes').get();
                const athletes = [];

                snapshot.forEach(doc => {
                    athletes.push({ id: doc.id, ...doc.data() });
                });

                renderAthletes(athletes);
                updateStats(athletes);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('firebaseStatus').innerHTML = '❌ Error conectando a Firebase';
                document.getElementById('firebaseStatus').className = 'status error';
            }
        }

        function renderAthletes(athletes) {
            let html = '<table><thead><tr><th>Atleta</th><th>Plan</th><th>Precio</th><th>Vencimiento</th><th>A Cobrar</th><th>Estado</th></tr></thead><tbody>';

            athletes.forEach(athlete => {
                const expiry = athlete.expiryDate ? new Date(athlete.expiryDate).toLocaleDateString('es-CL') : '-';
                html += `
                    <tr>
                        <td><span class="athlete-name">${athlete.nombre}</span></td>
                        <td><span class="athlete-plan">${athlete.plan}</span></td>
                        <td><span class="athlete-price">$${(athlete.price || 0).toLocaleString()}</span></td>
                        <td>${expiry}</td>
                        <td>$${(athlete.amountDue || 0).toLocaleString()}</td>
                        <td>${getStatusBadge(athlete.paymentStatus)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('athletesList').innerHTML = html;
        }

        function getStatusBadge(status) {
            switch(status) {
                case 'pagado': return '✅ Pagado';
                case 'pendiente': return '⏳ Pendiente';
                case 'congelado': return '❄️ Congelado';
                default: return '❓ Desconocido';
            }
        }

        function updateStats(athletes) {
            const totalAthletes = athletes.length;
            const totalIncome = athletes.reduce((sum, a) => sum + (a.price || 0), 0);
            const totalDue = athletes.reduce((sum, a) => sum + (a.amountDue || 0), 0);
            const totalPaid = athletes.filter(a => a.paymentStatus === 'pagado').reduce((sum, a) => sum + (a.price || 0), 0);

            document.getElementById('totalAthletes').textContent = totalAthletes;
            document.getElementById('totalIncome').textContent = `$${totalIncome.toLocaleString()}`;
            document.getElementById('totalDue').textContent = `$${totalDue.toLocaleString()}`;
            document.getElementById('totalPaid').textContent = `$${totalPaid.toLocaleString()}`;
        }

        loadAthletes();
    </script>
</body>
</html>
