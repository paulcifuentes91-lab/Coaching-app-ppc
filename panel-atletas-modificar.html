<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Atletas - Modificar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: #000; border-bottom: 3px solid #d4af37; padding: 20px; margin-bottom: 30px; border-radius: 5px; text-align: center; }
        h1 { font-size: 1.8rem; color: #d4af37; font-weight: 700; }
        .main-content { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .sidebar { background: #000; border: 1px solid #d4af37; border-radius: 5px; padding: 15px; height: fit-content; position: sticky; top: 20px; }
        .sidebar-title { color: #d4af37; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; font-size: 0.85rem; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        .athlete-link { display: block; padding: 10px; background: rgba(212, 175, 55, 0.05); border: 1px solid #d4af37; border-radius: 3px; color: #d4af37; cursor: pointer; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; transition: all 0.3s; text-align: left; }
        .athlete-link:hover { background: rgba(212, 175, 55, 0.15); transform: translateX(5px); }
        .athlete-link.active { background: rgba(212, 175, 55, 0.25); border-left: 3px solid #d4af37; padding-left: 7px; }
        .content { background: #000; border: 1px solid #d4af37; border-radius: 5px; padding: 25px; }
        .content-title { font-size: 1.3rem; color: #d4af37; margin-bottom: 20px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; font-weight: 700; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; color: #d4af37; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; }
        .form-input { width: 100%; padding: 10px; background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; color: #fff; border-radius: 3px; font-family: 'Montserrat', sans-serif; }
        .btn { padding: 10px 20px; background: #d4af37; color: #000; border: none; border-radius: 3px; cursor: pointer; font-weight: 700; transition: all 0.3s; text-transform: uppercase; font-size: 0.85rem; }
        .btn:hover { background: #e6c547; }
        .empty-state { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Panel de Atletas - Modificar</h1>
            <p style="color: #aaa;">Edita planes y accede a apps personales</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-title">👥 Atletas</div>
                <a class="athlete-link" onclick="seleccionarAtleta('rosa', event)">🧘 Rosa Pérez</a>
                <a class="athlete-link" onclick="seleccionarAtleta('maria', event)">💪 María José</a>
                <a class="athlete-link" onclick="seleccionarAtleta('magdalena', event)">🏋️ Magdalena</a>
            </div>

            <div class="content">
                <div id="emptyState" class="empty-state">
                    <div>👈 Selecciona un atleta del menú</div>
                </div>

                <div id="athletePanel" style="display: none;">
                    <div class="content-title" id="panelTitle"></div>
                    
                    <div class="form-group">
                        <label class="form-label">Plan Actual</label>
                        <input type="text" class="form-input" id="editPlan" placeholder="FULL + 12">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Frecuencia</label>
                        <input type="text" class="form-input" id="editFrecuencia" placeholder="4x/semana">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Calorías/Día</label>
                        <input type="number" class="form-input" id="editCalorias" placeholder="2100">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Proteína (g)</label>
                        <input type="number" class="form-input" id="editProteina" placeholder="145">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label class="form-label">Carbos (g)</label>
                            <input type="number" class="form-input" id="editCarbos" placeholder="240">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Grasas (g)</label>
                            <input type="number" class="form-input" id="editGrasas" placeholder="70">
                        </div>
                    </div>
                    <button class="btn" onclick="guardarCambios()">💾 Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const atletas = {
            rosa: { nombre: 'Rosa Pérez', plan: 'Tercera Edad', frecuencia: 'Lunes+Viernes', calorias: 1850, proteina: 98, carbos: 240, grasas: 54 },
            maria: { nombre: 'María José Amezaga', plan: 'FULL+12', frecuencia: 'Martes-Viernes', calorias: 2100, proteina: 145, carbos: 240, grasas: 70 },
            magdalena: { nombre: 'Magdalena Pinto', plan: 'FULL+12', frecuencia: 'Lun-Mié-Jue', calorias: 2000, proteina: 140, carbos: 220, grasas: 65 }
        };

        function seleccionarAtleta(key, event) {
            event.preventDefault();
            document.querySelectorAll('.athlete-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            
            const atleta = atletas[key];
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('athletePanel').style.display = 'block';
            document.getElementById('panelTitle').textContent = '⚙️ ' + atleta.nombre;
            
            document.getElementById('editPlan').value = atleta.plan;
            document.getElementById('editFrecuencia').value = atleta.frecuencia;
            document.getElementById('editCalorias').value = atleta.calorias;
            document.getElementById('editProteina').value = atleta.proteina;
            document.getElementById('editCarbos').value = atleta.carbos;
            document.getElementById('editGrasas').value = atleta.grasas;
        }

        function guardarCambios() {
            alert('✅ Cambios guardados correctamente');
        }
    </script>
</body>
</html>
