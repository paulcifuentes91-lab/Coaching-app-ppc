<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Coach - Pro Performance Coach v5.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #14171B;
            --surface: #1D2126;
            --surface-2: #262B31;
            --border: #2E333A;
            --text: #F3F2EE;
            --text-muted: #9BA1AA;
            --text-faint: #666B73;
            --pink: #FF7FAE;
            --radius: 16px;
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 30px;
            border-top: 3px solid var(--pink);
            text-align: center;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .subtitle { color: var(--text-muted); margin-bottom: 20px; }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .stat-chip {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-value { font-size: 1.8rem; color: var(--pink); font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 0.8rem; color: var(--text-faint); text-transform: uppercase; }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            font-family: var(--font-mono);
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .tab:hover { border-color: var(--pink); color: var(--pink); }
        .tab.active { background: var(--pink); color: var(--bg); border-color: var(--pink); }

        .section { display: none; }
        .section.active { display: block; }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--text);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .athletes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .athlete-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .athlete-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--pink), #FFB6D0);
        }

        .athlete-card:hover {
            background: var(--surface-2);
            border-color: var(--pink);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 127, 174, 0.15);
        }

        .athlete-name {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--text);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .athlete-info { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .info-row strong { color: var(--text); font-weight: 600; }

        .athlete-plan {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .plan-type {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .plan-name { color: var(--text); font-weight: 600; font-size: 0.95rem; }

        .athlete-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: var(--font-mono);
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover { background: var(--pink); color: var(--bg); border-color: var(--pink); }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .status-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; }
        .status-frozen { background: rgba(255, 152, 0, 0.2); color: #FFA500; border: 1px solid #FFA500; }

        .loading { text-align: center; color: var(--text-muted); padding: 40px; }
        .spinner { border: 3px solid var(--surface-2); border-top: 3px solid var(--pink); border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { text-align: center; color: var(--text-faint); font-size: 0.85rem; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏋️ Panel Coach</h1>
            <p class="subtitle">Pro Performance Coach v5.0 · Mentalidad Primero</p>
            
            <div class="header-stats">
                <div class="stat-chip">
                    <div class="stat-value" id="totalAthletes">-</div>
                    <div class="stat-label">Atletas</div>
                </div>
                <div class="stat-chip">
                    <div class="stat-value" id="presencialesCount">-</div>
                    <div class="stat-label">Presenciales</div>
                </div>
                <div class="stat-chip">
                    <div class="stat-value" id="onlineCount">-</div>
                    <div class="stat-label">Online</div>
                </div>
                <div class="stat-chip">
                    <div class="stat-value" id="totalIncome">-</div>
                    <div class="stat-label">Ingresos/Mes</div>
                </div>
            </div>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('presenciales', event)">🏃 Presenciales</div>
            <div class="tab" onclick="switchTab('online', event)">💻 Online</div>
        </div>

        <div id="presenciales" class="section active">
            <div class="section-title">🏃 Atletas Presenciales</div>
            <div id="presencialesList">
                <div class="loading">
                    <div class="spinner"></div>
                    Cargando atletas...
                </div>
            </div>
        </div>

        <div id="online" class="section">
            <div class="section-title">💻 Atletas Online</div>
            <div id="onlineList">
                <div class="loading">
                    <div class="spinner"></div>
                    Cargando atletas...
                </div>
            </div>
        </div>

        <footer>Pro Performance Coach v5.0 | Mentalidad Primero © 2026</footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPY3MwFy-vKvL7sQzlPn9K5zL6qvW8",
            authDomain: "pro-performance-e811e.firebaseapp.com",
            projectId: "pro-performance-e811e",
            storageBucket: "pro-performance-e811e.appspot.com",
            messagingSenderId: "859088259827",
            appId: "1:859088259827:web:8a9e4c2b7f1d3e5a6b9c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadAthletes() {
            try {
                const snapshot = await db.collection('athletes').get();
                const athletes = [];

                snapshot.forEach(doc => {
                    athletes.push({ id: doc.id, ...doc.data() });
                });

                const presenciales = athletes.filter(a => a.type === 'presencial');
                const online = athletes.filter(a => a.type === 'online');

                renderAthletes(presenciales, 'presenciales');
                renderAthletes(online, 'online');
                updateStats(athletes, presenciales, online);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderAthletes(athletes, type) {
            let html = '';
            athletes.forEach(athlete => {
                const planSlug = athlete.nombre.toLowerCase().replace(/\s+/g, '-');
                const planUrl = `plan-${planSlug}.html`;
                
                html += `
                    <div class="athlete-card">
                        <div class="athlete-name">${athlete.nombre}</div>
                        <div class="athlete-info">
                            <div class="info-row"><strong>Plan:</strong> ${athlete.plan}</div>
                            <div class="info-row"><strong>Precio:</strong> $${(athlete.price || 0).toLocaleString()}</div>
                            <div class="info-row"><strong>Vencimiento:</strong> ${athlete.expiryDate || '-'}</div>
                        </div>
                        <div class="athlete-plan">
                            <div class="plan-type">📋 Estado</div>
                            <div class="plan-name">${getStatusBadgeText(athlete.paymentStatus)}</div>
                        </div>
                        <div class="athlete-buttons">
                            <button class="btn" onclick="window.location.href='${planUrl}'">📋 Ver Plan</button>
                            <button class="btn" onclick="alert('Admin: ' + '${athlete.nombre}')">⚙️ Editar</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById(type + 'List').innerHTML = html || '<p style="color: var(--text-muted);">Sin atletas</p>';
        }

        function getStatusBadgeText(status) {
            switch(status) {
                case 'pagado': return '✅ Pagado';
                case 'pendiente': return '⏳ Pendiente';
                case 'congelado': return '❄️ Congelado';
                default: return '❓ Desconocido';
            }
        }

        function updateStats(all, presenciales, online) {
            const totalIncome = all.reduce((sum, a) => sum + (a.price || 0), 0);
            
            document.getElementById('totalAthletes').textContent = all.length;
            document.getElementById('presencialesCount').textContent = presenciales.length;
            document.getElementById('onlineCount').textContent = online.length;
            document.getElementById('totalIncome').textContent = `$${totalIncome.toLocaleString()}`;
        }

        function switchTab(tabName, event) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        loadAthletes();
    </script>
</body>
</html>
